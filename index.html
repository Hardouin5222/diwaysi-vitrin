<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diwaysi | Ваша глобальная туристическая сеть скоро появится</title>
    <!-- Poppins (Ana Font) ve Caveat (El Yazısı Fontu) entegrasyonu -->
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            overflow: hidden;
            position: relative;
        }

        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(255,255,255,0.05) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(255,255,255,0.05) 0%, transparent 50%);
            z-index: 1;
        }

        .container {
            z-index: 2;
            text-align: center;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo {
            font-size: 4rem;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 10px;
            background: linear-gradient(to right, #00c6ff, #0072ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: fadeInDown 1s ease-out;
        }

        .subtitle {
            font-size: 1.2rem;
            font-weight: 300;
            color: #d1d8e0;
            margin-bottom: 40px;
            letter-spacing: 1px;
            animation: fadeInUp 1s ease-out 0.5s both;
        }

        .loader-wrapper {
            position: relative;
            width: 100%;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: fadeInUp 1s ease-out 1s both;
        }

        .path-line {
            width: 250px;
            height: 2px;
            background: rgba(255, 255, 255, 0.2);
            position: absolute;
            border-radius: 2px;
        }

        .plane {
            position: absolute;
            left: calc(50% - 125px);
            font-size: 24px;
            animation: fly 3s ease-in-out infinite;
        }

        .status {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #00c6ff;
            text-transform: uppercase;
            letter-spacing: 3px;
            animation: pulse 1.5s infinite;
        }

        /* Diana'ya Özel Teşekkür Notu (Rusça El Yazısı) */
        .dedication {
            font-family: 'Caveat', cursive;
            font-size: 2rem;
            color: #e0e0e0;
            margin-top: 50px;
            letter-spacing: 1.5px;
            opacity: 0.8;
            animation: fadeInUp 1s ease-out 1.5s both;
            max-width: 600px;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fly {
            0% { transform: translateX(0) translateY(0) scale(0.8); opacity: 0; }
            20% { opacity: 1; transform: translateX(50px) translateY(-10px) scale(1); }
            80% { opacity: 1; transform: translateX(200px) translateY(-10px) scale(1); }
            100% { transform: translateX(250px) translateY(0) scale(0.8); opacity: 0; }
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        @media (max-width: 600px) {
            .logo { font-size: 3rem; }
            .subtitle { font-size: 1rem; }
            .dedication { font-size: 1.6rem; padding: 0 15px; }
            .path-line { width: 200px; }
            .plane { left: calc(50% - 100px); }
            @keyframes fly {
                0% { transform: translateX(0) translateY(0) scale(0.8); opacity: 0; }
                20% { opacity: 1; transform: translateX(40px) translateY(-10px) scale(1); }
                80% { opacity: 1; transform: translateX(160px) translateY(-10px) scale(1); }
                100% { transform: translateX(200px) translateY(0) scale(0.8); opacity: 0; }
            }
        }
    </style>
</head>
<body>
    <div class="particles"></div>
    <div class="container">
        <!-- Marka Adı -->
        <div class="logo">Diwaysi</div>
        
        <!-- Rusça Slogan (Yeni Nesil Küresel Seyahat Ağınız Kuruluyor) -->
        <div class="subtitle">Создается глобальная туристическая сеть нового поколения</div>
        
        <!-- Uçak Animasyonu -->
        <div class="loader-wrapper">
            <div class="path-line"></div>
            <div class="plane">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M21 16V14L13 9V3.5C13 2.67 12.33 2 11.5 2C10.67 2 10 2.67 10 3.5V9L2 14V16L10 13.5V19L8 20.5V22L11.5 21L15 22V20.5L13 19V13.5L21 16Z" fill="#00c6ff"/>
                </svg>
            </div>
        </div>
        
        <!-- Rusça Yükleniyor Metni (Sistemler Hazırlanıyor...) -->
        <div class="status">Подготовка систем...</div>

        <!-- Diana'ya Rusça El Yazısı Teşekkür Notu -->
        <div class="dedication">
            Благодаря вкладу Дианы, мы выражаем ей нашу глубочайшую признательность.
        </div>
    </div>
</body>
</html>
